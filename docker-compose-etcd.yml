# docker-compose-etcd.yml
version: '3.8'

services:
  etcd:
    image: rancher/etcd:v3.4.13-k3s1
    container_name: etcd
    environment:
      - ETCD_NAME=vm3
      - ETCD_ADVERTISE_CLIENT_URLS=http://${VM3_IP}:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://${VM3_IP}:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_INITIAL_CLUSTER=vm3=http://${VM3_IP}:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_INITIAL_CLUSTER_TOKEN=keycloak-etcd
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - etcd_data:/etcd-data
    restart: unless-stopped
    networks:
      - keycloak-net

networks:
  keycloak-net:
    driver: bridge

volumes:
  etcd_data:


